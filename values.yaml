# ============================================================
# values.yaml — 所有可設定的參數，集中在這一個檔案
# ============================================================
#
# 【為什麼需要這個檔案？】
#   以前參數散佈在 7 個 YAML 裡，換專案要逐一搜尋替換，容易漏改。
#   現在所有超參數集中在這裡，換專案只需要改這個檔案。
#
# 【誰會改這個檔案？】
#   1. DevOps 手動改：換專案名稱、調整資源、改域名
#   2. CI/CD 自動改：GitHub Actions 更新 image.tag（每次部署）
#
# 【跟 infra repo 的對齊關係】
#   本檔案的值必須跟 stockbot-long-backend-k8s-infra 的設定一致：
#   - secret.name: "myapp-db"  → 對齊 infra/install-all.sh 建立的 Secret 名稱
#   - secret.key: "dsn"        → 對齊 infra/install-all.sh 建立的 Secret key
#   - serviceMonitor.releaseLabel: "monitoring"
#     → 對齊 infra/install-all.sh 中 Helm release name:
#        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
#   - ingress.className: "nginx"
#     → 對齊 infra 安裝的 ingress-nginx controller
# ============================================================

# ---------- 應用程式基本資訊 ----------
# 這個名稱會用在所有資源的 metadata.name、labels、selector
appName: myapp

# K8s Namespace（對應 infra/install-all.sh 建立的 namespace）
namespace: myapp

# ---------- Container Image ----------
# CI/CD 流程中，GitHub Actions 會自動更新 image.tag 為最新的 commit SHA
# 例如：image.tag: "abc1234"
image:
  repository: ghcr.io/yourorg/stockbot-long-backend
  tag: latest

# Go app 監聽的 port
containerPort: 8080

# ---------- Ingress（外部流量入口）----------
# 對齊 infra repo：ingress controller = nginx，host = myapp.local
ingress:
  host: myapp.local         # 域名（開發環境需在 /etc/hosts 設定）
  className: nginx           # 對齊 infra 安裝的 ingress-nginx controller
  maxBodySize: "10m"         # 允許的最大 request body（nginx annotation）

# ---------- Secret（資料庫連線）----------
# ⚠️ 密碼不在這裡！Secret 由 infra repo 的 install-all.sh 建立在 K8s 裡
# 這裡只定義「去哪裡找 Secret」
# 對齊 infra/install-all.sh:
#   kubectl -n myapp create secret generic myapp-db --from-literal=dsn="..."
secret:
  name: myapp-db             # Secret 名稱（對齊 infra/install-all.sh）
  key: dsn                   # Secret 中的 key（對齊 infra/install-all.sh）

# 環境變數名稱（Go 程式碼用 os.Getenv("DB_DSN") 讀取）
envName: DB_DSN

# ---------- ServiceMonitor（Prometheus 監控）----------
# 對齊 infra repo：helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
serviceMonitor:
  enabled: true              # 是否建立 ServiceMonitor
  releaseLabel: monitoring   # ⚡ 必須跟 infra 的 Helm release name 一致
  interval: 15s              # 抓取間隔
  path: /metrics             # 指標端點路徑

# ---------- Prometheus Pod Annotations ----------
# 有些 Prometheus 設定用 annotation 自動發現（跟 ServiceMonitor 並行，雙保險）
prometheus:
  scrape: true

# ---------- 資源限制 ----------
resources:
  requests:
    cpu: 50m                 # 保證最低 0.05 核心
    memory: 32Mi             # 保證最低 32 MiB
  limits:
    cpu: 250m                # 最多 0.25 核心
    memory: 128Mi            # 最多 128 MiB（超過 → OOMKill）

# ---------- HPA（自動擴縮）----------
hpa:
  minReplicas: 2             # 最少副本數（高可用至少 2）
  maxReplicas: 5             # 最多副本數
  targetCPU: 70              # 目標 CPU 使用率 %（基於 resources.requests.cpu）

# ---------- 健康檢查 ----------
healthCheck:
  liveness:
    path: /health            # 存活探針路徑（失敗 → 重啟容器）
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /ready             # 就緒探針路徑（失敗 → 移出流量）
    initialDelaySeconds: 5
    periodSeconds: 10

# ============================================================
# Ingress — 從 cluster 外部進入的「HTTP 路由規則」
# ============================================================
#
# 【什麼是 Ingress？】
#   Ingress 定義了「外部 HTTP/HTTPS 請求怎麼路由到內部 Service」的規則。
#   它本身只是一份規則（像 nginx.conf），真正執行規則的是 Ingress Controller。
#
# 【Ingress vs Ingress Controller】
#   - Ingress（本檔案）：YAML 設定檔，描述路由規則
#   - Ingress Controller（裝在 infra repo）：實際跑著的 nginx/traefik 反向代理
#   沒有 Ingress Controller，Ingress 就只是一張廢紙。
#
# 【流量路徑】
#   使用者瀏覽器
#     → DNS 解析 myapp.local → Node IP
#     → Ingress Controller (nginx) 收到請求
#     → 根據 Ingress 規則比對 host + path
#     → 轉發到 Service (myapp:80)
#     → Service 轉發到 Pod (myapp:8080)
#
# 【ingressClassName】
#   K8s 1.18+ 用 ingressClassName 取代舊的 annotation
#   kubernetes.io/ingress.class: nginx
#   如果 cluster 裡有多個 Ingress Controller，用這個欄位指定要用哪一個
#
# 【annotations 說明】
#   nginx.ingress.kubernetes.io/proxy-body-size: "10m"
#   → 允許最大 10MB 的請求 body（預設是 1MB，上傳檔案時常需要調大）
#
# 【pathType 說明】
#   - Prefix：路徑前綴匹配，/ 會匹配所有路徑（/api、/health 等都會匹配）
#   - Exact：完全匹配，/api 只匹配 /api，不匹配 /api/v1
#   - ImplementationSpecific：由 Ingress Controller 自行決定匹配方式
#
# 【教學重點】
#   - host 欄位：請求的 Host header 必須是 myapp.local 才會匹配這條規則
#     開發環境需要在 /etc/hosts 或 DNS 設定指向 cluster
#   - backend.service.port.number: 80 → 對應 Service 的 port（不是 Pod 的 8080）
#
# 【常用指令】
#   kubectl get ingress -n myapp               # 列出 Ingress
#   kubectl describe ingress myapp -n myapp    # 查看詳細（含 backend 對應）
# ============================================================

apiVersion: networking.k8s.io/v1    # API 版本：Ingress 屬於 networking 群組 v1 版
kind: Ingress                       # 資源類型：Ingress
metadata:
  name: myapp                       # Ingress 名稱
  namespace: myapp                  # 所屬 Namespace
  annotations:
    # 允許請求 body 最大 10MB（nginx Ingress Controller 專用的 annotation）
    # 預設只有 1MB，如果 API 需要接收較大的 JSON payload 或檔案上傳就要調大
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

spec:
  # 指定使用哪個 Ingress Controller（cluster 裡可能裝了不只一個）
  ingressClassName: nginx

  # --- rules：路由規則 ---
  rules:
    - host: myapp.local             # 只有 Host header 為 myapp.local 的請求會匹配
      http:
        paths:
          - path: /                 # 路徑前綴：/ 代表匹配所有路徑
            pathType: Prefix        # 匹配模式：前綴匹配
            backend:
              service:
                name: myapp         # 轉發到哪個 Service（對應 service.yaml 的 name）
                port:
                  number: 80        # Service 的 port（對應 service.yaml 的 port: 80）

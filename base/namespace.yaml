# ============================================================
# Namespace — Kubernetes 的「資料夾」概念
# ============================================================
#
# 【什麼是 Namespace？】
#   Namespace 是 K8s 裡的邏輯隔離單位，類似作業系統的資料夾。
#   同一個 cluster 裡可以有多個 Namespace，各自獨立管理資源。
#   好處：
#     1. 不同專案 / 環境（dev, staging, prod）可以用不同 Namespace 隔開
#     2. 可以針對 Namespace 設定 ResourceQuota（限制 CPU / 記憶體上限）
#     3. RBAC 權限也可以按 Namespace 切分（誰能看哪些資源）
#
# 【為什麼需要自建 Namespace？】
#   K8s 預設有 default、kube-system 等 Namespace，但把自己的 app 放在
#   default 裡會很亂。建一個專屬 Namespace（myapp）讓所有相關資源
#  （Deployment、Service、Secret…）都住在一起，方便管理與清理。
#
# 【教學重點】
#   - apiVersion: v1 → Namespace 是 K8s 核心 API 的一部分，不需要額外安裝 CRD
#   - kind: Namespace → 告訴 K8s「我要建立的是一個 Namespace」
#   - metadata.name → Namespace 的名稱，之後其他資源的 namespace 欄位都要填這個名字
#
# 【常用指令】
#   kubectl get ns                  # 列出所有 Namespace
#   kubectl get all -n myapp        # 列出 myapp Namespace 裡的所有資源
#   kubectl delete ns myapp         # ⚠️ 刪除 Namespace 會連裡面所有資源一起刪掉！
# ============================================================

apiVersion: v1          # API 版本：Namespace 屬於核心 API（v1）
kind: Namespace         # 資源類型：Namespace
metadata:
  name: myapp           # Namespace 名稱，其他 YAML 裡的 namespace 欄位都要填 "myapp"

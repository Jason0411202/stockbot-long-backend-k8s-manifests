# ============================================================
# HPA (HorizontalPodAutoscaler) — 自動水平擴縮 Pod 數量
# ============================================================
#
# 【什麼是 HPA？】
#   HPA 會根據 Pod 的 CPU / 記憶體使用率（或自訂指標），
#   自動增加或減少 Pod 的副本數量。
#   忙的時候多開幾個 Pod 分散壓力，閒的時候縮回去省資源。
#
# 【HPA 怎麼運作？】
#   1. HPA Controller 每 15 秒（預設）從 Metrics Server 查詢 Pod 的資源使用量
#   2. 計算所有 Pod 的平均 CPU 使用率
#   3. 跟 target（averageUtilization）比較
#   4. 如果超過 → 增加 Pod；如果低於 → 減少 Pod
#
# 【計算公式】
#   期望副本數 = ceil( 目前副本數 × (目前指標值 / 目標指標值) )
#
#   範例：目前 2 個 Pod，平均 CPU 使用率 90%，目標 70%
#   期望副本數 = ceil(2 × 90/70) = ceil(2.57) = 3 → 擴容到 3 個 Pod
#
# 【averageUtilization 是怎麼算的？】
#   ⚠️ 百分比是相對於 resources.requests.cpu，不是 limits！
#   例如：requests.cpu = 50m，averageUtilization = 70%
#   → 當平均每個 Pod 的 CPU 使用量達到 35m（50m × 70%）時就會觸發擴容
#
# 【HPA vs Deployment replicas】
#   - 如果啟用了 HPA，HPA 會覆蓋 Deployment 的 replicas 欄位
#   - 最終 Pod 數量由 HPA 控制，介於 minReplicas 和 maxReplicas 之間
#   - Deployment 裡的 replicas: 1 只在 HPA 尚未生效時有用（初始值）
#
# 【為什麼需要 Metrics Server？】
#   HPA 需要知道每個 Pod 目前用了多少 CPU / 記憶體，
#   這些資料由 Metrics Server 提供（infra repo 負責安裝）。
#   沒有 Metrics Server → HPA 無法取得指標 → 不會擴縮。
#
# 【冷卻時間（Cooldown）】
#   K8s 預設：
#     擴容冷卻：0 秒（馬上擴）
#     縮容冷卻：5 分鐘（避免頻繁縮放造成抖動）
#   可以透過 behavior 欄位自訂冷卻策略（本檔案未設定，使用預設值）
#
# 【常用指令】
#   kubectl get hpa -n myapp                # 查看 HPA 狀態（含目前副本數、CPU%）
#   kubectl describe hpa myapp -n myapp     # 查看詳細事件（擴縮歷史紀錄）
#   kubectl top pods -n myapp               # 查看 Pod 的實際 CPU / 記憶體用量
# ============================================================

apiVersion: autoscaling/v2     # API 版本：HPA v2（支援多指標、自訂指標）
kind: HorizontalPodAutoscaler  # 資源類型：HPA（水平 Pod 自動擴縮器）
metadata:
  name: myapp                  # HPA 名稱
  namespace: myapp             # 所屬 Namespace

spec:
  # --- scaleTargetRef：HPA 要控制哪個資源的副本數 ---
  # 指向 Deployment "myapp"，HPA 會調整它的 replicas
  scaleTargetRef:
    apiVersion: apps/v1        # 目標資源的 API 版本
    kind: Deployment           # 目標資源類型（通常是 Deployment）
    name: myapp                # 目標 Deployment 名稱

  minReplicas: 2               # 最少副本數（即使完全沒流量也至少保持 2 個，確保高可用）
  maxReplicas: 5               # 最多副本數（防止無限擴容吃光 cluster 資源）

  # --- metrics：擴縮依據的指標 ---
  metrics:
    - type: Resource           # 指標類型：Resource（K8s 內建的 CPU / Memory）
      resource:
        name: cpu              # 監控 CPU 使用率
        target:
          type: Utilization    # 使用「百分比」模式（相對於 requests.cpu）
          averageUtilization: 70  # 目標：所有 Pod 的平均 CPU 使用率維持在 70%
          # 超過 70% → 擴容（加 Pod）
          # 低於 70% → 縮容（減 Pod，但不低於 minReplicas）

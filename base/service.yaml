# ============================================================
# Service — Pod 的「穩定入口」與「負載均衡器」
# ============================================================
#
# 【什麼是 Service？】
#   Pod 的 IP 是動態的（每次重建都會變），外部無法直接穩定地連到 Pod。
#   Service 提供一個穩定的 DNS 名稱和 ClusterIP，負責把流量導到背後的 Pod。
#
# 【Service 的類型】
#   - ClusterIP（預設）：只在 cluster 內部可見，給內部服務互相呼叫用
#   - NodePort：在每個 Node 上開一個 port，讓外部透過 Node IP:Port 存取
#   - LoadBalancer：雲端環境會自動建一個外部 Load Balancer（如 AWS ELB）
#   本檔案沒有指定 type，所以預設是 ClusterIP。
#   外部流量靠 Ingress 進來，不需要 NodePort 或 LoadBalancer。
#
# 【Service 怎麼找到 Pod？】
#   靠 selector！Service 會找所有 label 符合 selector 條件的 Pod，
#   然後把流量平均分配給它們（Round Robin）。
#
# 【port vs targetPort】
#   port：Service 對外暴露的 port（其他服務連 myapp:80 時用的）
#   targetPort：流量實際轉發到 Pod 的哪個 port（Go app 監聽的 8080）
#
#   其他 Pod 連 → Service(port:80) → Pod(targetPort:8080)
#
# 【DNS 名稱】
#   建立 Service 後，K8s 自動建立 DNS 記錄：
#     myapp.myapp.svc.cluster.local
#     ^^^^^^ ^^^^^ ^^^
#     服務名  命名空間  固定後綴
#   同 Namespace 內可以簡寫為 myapp，跨 Namespace 用 myapp.myapp
#
# 【常用指令】
#   kubectl get svc -n myapp                # 列出 Service
#   kubectl describe svc myapp -n myapp     # 查看詳細（包含 Endpoints）
#   kubectl get endpoints myapp -n myapp    # 查看 Service 背後的 Pod IP 清單
# ============================================================

apiVersion: v1          # API 版本：Service 屬於核心 API（v1）
kind: Service           # 資源類型：Service
metadata:
  name: myapp           # Service 名稱（也是 DNS 名稱的一部分）
  namespace: myapp      # 所屬 Namespace
  labels:
    app: myapp          # Service 自身的 label（方便用 kubectl get svc -l app=myapp 篩選）

spec:
  # --- selector：決定流量要導到哪些 Pod ---
  # 所有 label 含 app=myapp 的 Pod 都會收到這個 Service 的流量
  # ⚠️ 這裡的 selector 要跟 Deployment template.metadata.labels 一致
  selector:
    app: myapp

  # --- ports：端口映射 ---
  ports:
    - name: http          # 端口名稱（Ingress 和 ServiceMonitor 可以用名稱參照）
      port: 80            # Service 對外暴露的 port（Ingress 連 Service 時用 port: 80）
      targetPort: 8080    # 轉發到 Pod 的 port（Go app 實際監聽的 8080）
      # 流量路徑：Ingress → Service:80 → Pod:8080

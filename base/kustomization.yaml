# ============================================================
# Kustomization — Kustomize 的「總管清單」
# ============================================================
#
# 【什麼是 Kustomize？】
#   Kustomize 是 K8s 內建的設定管理工具（kubectl 原生支援）。
#   它的核心概念是：用一個 base（基礎設定）搭配多個 overlay（覆蓋層），
#   產生出不同環境（dev / staging / prod）的最終 YAML。
#
# 【本檔案的角色】
#   這個 kustomization.yaml 是 base 層的進入點。
#   它告訴 Kustomize：「以下這些 YAML 檔案是我的基礎資源清單」。
#   ArgoCD 會讀取這個檔案，自動找到並套用所有列出的資源。
#
# 【CI/CD 中怎麼用？】
#   GitHub Actions build 完新 image 後，會用 kustomize edit 指令
#   修改這個檔案（或透過 images 欄位），把 image tag 更新為最新的 commit SHA：
#
#   kustomize edit set image ghcr.io/yourorg/stockbot-long-backend:abc1234
#
#   這會在本檔案加上（或更新）images 欄位：
#   images:
#     - name: ghcr.io/yourorg/stockbot-long-backend
#       newTag: abc1234
#
#   ArgoCD 偵測到這個變更後，就會自動部署新版本。
#
# 【為什麼不直接 kubectl apply -f .？】
#   1. Kustomize 可以做 image tag 替換、label 注入、namespace 覆寫等操作
#   2. 搭配 overlay 可以輕鬆管理多環境設定
#   3. ArgoCD 原生支援 Kustomize，直接指向這個檔案就能自動部署
#
# 【常用指令】
#   kustomize build base/                   # 預覽 Kustomize 產生的最終 YAML
#   kubectl apply -k base/                  # 用 Kustomize 部署（-k 代表 kustomize）
#   kustomize edit set image <name>:<tag>   # 更新 image tag
# ============================================================

apiVersion: kustomize.config.k8s.io/v1beta1   # Kustomize API 版本
kind: Kustomization                            # 資源類型：Kustomization（Kustomize 的設定檔）

# --- resources：要管理的 YAML 檔案清單 ---
# Kustomize 會按順序讀取這些檔案，合併產生最終的 K8s 資源
# ⚠️ 新增 YAML 檔案後記得加到這裡，否則 ArgoCD 不會部署它
resources:
  - namespace.yaml        # 1. 先建立 Namespace（其他資源都依賴它）
  - deployment.yaml       # 2. 部署 Pod（應用程式本體）
  - service.yaml          # 3. 建立 Service（提供穩定的內部存取入口）
  - ingress.yaml          # 4. 建立 Ingress（提供外部 HTTP 路由）
  - servicemonitor.yaml   # 5. 建立 ServiceMonitor（讓 Prometheus 監控）
  - hpa.yaml              # 6. 建立 HPA（自動擴縮 Pod 數量）

# --- images（由 CI/CD 自動加入）---
# GitHub Actions 會用 kustomize edit set image 加上類似以下的欄位：
# images:
#   - name: ghcr.io/yourorg/stockbot-long-backend
#     newTag: abc1234
# 這樣 Deployment 裡的 image 就會被替換成帶有具體 SHA tag 的版本
